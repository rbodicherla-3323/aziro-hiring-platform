version: "3.9"

services:
  # ── PostgreSQL Database ──
  db:
    image: postgres:16-alpine
    container_name: ai_db
    restart: always
    environment:
      POSTGRES_DB: aziro_hiring
      POSTGRES_USER: aziro
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-AziroDb2026}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aziro -d aziro_hiring"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Flask + Gunicorn Backend ──
  backend:
    build: .
    container_name: ai_backend
    restart: always
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql://aziro:${POSTGRES_PASSWORD:-AziroDb2026}@db:5432/aziro_hiring
      FLASK_DEBUG: "0"
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data/uploads:/app/app/uploads
      - ./data/reports:/app/app/runtime/reports
      - ./data/proctoring:/app/app/runtime/proctoring

  # ── Nginx Reverse Proxy (HTTPS termination) ──
  nginx:
    image: nginx:1.27-alpine
    container_name: ai_nginx
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./app/static:/app/app/static:ro
