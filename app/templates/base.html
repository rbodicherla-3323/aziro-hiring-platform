<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}AI Hiring Platform{% endblock %}</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>

<div class="d-flex">

    <!-- SIDEBAR -->
    <aside class="sidebar bg-dark text-white">
        <div class="sidebar-header">
            <h6 class="mb-0">AI Hiring</h6>
            <small class="text-muted">Admin Panel</small>
        </div>

        <ul class="nav flex-column mt-4">

    <li class="nav-item">
        <a class="nav-link {% if request.path == '/dashboard' %}active{% endif %}"
           href="/dashboard">
            Dashboard
        </a>
    </li>

    <li class="nav-item">
        <a class="nav-link {% if request.path == '/create-test' %}active{% endif %}"
           href="/create-test">
            Create Test
        </a>
    </li>

    <li class="nav-item">
        <a class="nav-link {% if request.path == '/generated-tests' %}active{% endif %}"
           href="/generated-tests">
            Generated Tests
        </a>
    </li>

    <li class="nav-item">
        <a class="nav-link {% if request.path == '/evaluation' %}active{% endif %}"
           href="/evaluation">
            Evaluation
        </a>
    </li>

    <li class="nav-item">
        <a class="nav-link {% if request.path == '/reports' %}active{% endif %}"
           href="#">
            Reports
        </a>
    </li>

</ul>


        <div class="sidebar-footer">
            <a href="/logout" class="nav-link text-danger">Logout</a>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="content-area">

        <!-- TOP NAVBAR -->
        <nav class="navbar navbar-light bg-white shadow-sm px-4 d-flex justify-content-between">
            <div class="d-flex align-items-center">
                <img src="{{ url_for('static', filename='images/azirotech_logo.jpg') }}"
                     alt="Aziro Logo"
                     height="36"
                     class="me-2">
                <span class="navbar-text fw-semibold">
                    Aziro Hiring Platform
                </span>
            </div>
        </nav>

        <!-- PAGE CONTENT -->
        <div class="container-fluid">
            {% block content %}{% endblock %}
        </div>

        <!-- FOOTER -->
        <footer class="text-center text-muted mt-5 mb-3 small">
            © 2026 AI-Based Interview Automation System
        </footer>

    </main>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>

</html>
