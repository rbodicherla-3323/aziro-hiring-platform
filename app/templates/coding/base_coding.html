<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title or "Aziro Coding Assessment" }}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='coding/coding.css') }}">

    <style>
        :root {
            --aziro-primary: #1f4fd8;
            --aziro-bg: #0c1120;
            --aziro-card: #141b2d;
            --aziro-border: rgba(56, 78, 122, 0.3);
            --aziro-text: #e8edf5;
            --aziro-muted: #7486a6;
            --aziro-success: #22c55e;
            --aziro-danger: #ef4444;
            --aziro-warning: #f59e0b;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: "Manrope", "Segoe UI", system-ui, -apple-system, sans-serif;
            background: var(--aziro-bg);
            color: var(--aziro-text);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .page {
            max-width: 920px;
            margin: 40px auto;
            padding: 0 20px;
            position: relative;
            z-index: 1;
        }

        .card {
            background: var(--aziro-card);
            border-radius: 16px;
            padding: 35px;
            border: 1px solid var(--aziro-border);
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.35);
        }

        .btn {
            padding: 12px 26px;
            border-radius: 8px;
            font-size: 15px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            font-family: "Manrope", "Segoe UI", sans-serif;
            letter-spacing: 0.01em;
            transition: transform 0.16s ease, box-shadow 0.16s ease, background-color 0.16s ease;
        }

        .btn:hover { transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }

        .btn-primary {
            background: linear-gradient(135deg, var(--aziro-primary) 0%, #2a63f0 100%);
            color: white;
            box-shadow: 0 10px 18px rgba(31, 79, 216, 0.24);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #163db5 0%, #2256da 100%);
            box-shadow: 0 12px 22px rgba(31, 79, 216, 0.28);
        }

        .btn-danger {
            background: linear-gradient(135deg, #d83f4f 0%, #bf2c3b 100%);
            color: white;
            box-shadow: 0 10px 18px rgba(220, 53, 69, 0.22);
        }

        .btn-success {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            color: white;
            box-shadow: 0 10px 18px rgba(34, 197, 94, 0.22);
        }

        .actions {
            margin-top: 30px;
            text-align: right;
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>
<body>

<div class="header">
    <div class="logo">
        <img src="{{ url_for('static', filename='images/azirotech_logo.jpg') }}">
        <strong>Aziro Hiring</strong>
    </div>

    {% block header_center %}{% endblock %}

    <div class="candidate">
        Candidate: {{ candidate_name or "Candidate" }}
    </div>
</div>

<div class="page">
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
{% block extra_js %}{% endblock %}
<script src="{{ url_for('static', filename='js/coding_proctoring.js') }}"></script>
</body>
</html>
