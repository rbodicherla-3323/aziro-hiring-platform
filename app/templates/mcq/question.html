{% extends "mcq/base_mcq.html" %}
{% block content %}

<div class="card">

    <!-- Progress info -->
    <div style="
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-bottom:18px;
    ">
        <div style="font-size:14px; color:var(--aziro-muted);">
            Question {{ q_index + 1 }} of {{ total_questions }}
        </div>
    </div>

    <!-- Question text -->
    <h3 style="
        margin-bottom:26px;
        line-height:1.5;
        font-weight:600;
    ">
        {{ question.question or question.text }}
    </h3>

    <!-- Options -->
    <form method="POST">
        {% for option in question.options %}
        <label style="
            display:block;
            margin-bottom:14px;
            padding:12px 16px;
            border:1px solid var(--aziro-border);
            border-radius:6px;
            cursor:pointer;
            transition: background 0.2s ease, border 0.2s ease;
        "
        onmouseover="this.style.background='#f8f9ff'"
        onmouseout="this.style.background='white'">

            <input type="radio"
                   name="answer"
                   value="{{ option }}"
                   required
                   style="margin-right:10px;">

            {{ option }}
        </label>
        {% endfor %}

        <!-- Action -->
        <div class="actions">
            <button class="btn btn-primary">
                {% if q_index + 1 == total_questions %}
                    Submit
                {% else %}
                    Next
                {% endif %}
            </button>
        </div>
    </form>

</div>

{% endblock %}
