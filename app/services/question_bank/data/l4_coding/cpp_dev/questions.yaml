  - input: [["the","day","is","sunny","the","the","the","sunny","is","is"],3]
    expected: ["the","is","sunny"]
  - input: [["a","b","c"],2]
    expected: ["a","b"]
  hidden_tests:
  - input: [["bob","alice","bob","bob","alice","z"],2]
    expected: ["bob","alice"]
  - input: [["x","y","x","z","y","x"],1]
    expected: ["x"]

- id: 50
  title: Longest Subarray with At Most K Distinct
  difficulty: MEDIUM
  description: >
    Given an integer array, return the length of the longest subarray
    containing at most k distinct values.
