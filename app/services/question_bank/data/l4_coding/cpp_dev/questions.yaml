- id: 5
  title: Balanced Parentheses
  difficulty: MEDIUM
  description: >
    Given a string consisting only of characters (), {}, and [], determine
    whether the parentheses are balanced. A string is balanced if every opening
    bracket has a corresponding closing bracket and the pairs are properly nested.
  function:
    cpp: 'string solve(string s)'
  public_tests:
  - input: ["()[]{}"]
    expected: "YES"
  - input: ["([)]"]
    expected: "NO"
  - input: ["{[()]}"]
    expected: "YES"
  hidden_tests:
  - input: ["("]
    expected: "NO"
  - input: [")"]
    expected: "NO"
  - input: ["((()))"]
    expected: "YES"
  - input: ["({[]})"]
    expected: "YES"
  - input: ["({[})"]
    expected: "NO"
  - input: ["[]"]
    expected: "YES"
  - input: ["{[}"]
    expected: "NO"
  - input: ["()"]
    expected: "YES"
  - input: ["((())"]
    expected: "NO"
  - input: ["(()())"]
    expected: "YES"
  - input: ["[{()}]"]
    expected: "YES"
  - input: ["{[(])}"]
    expected: "NO"
  - input: ["{{{{}}}}"]
    expected: "YES"
  - input: ["[[]"]
    expected: "NO"
  - input: ["([]{})"]
    expected: "YES"

